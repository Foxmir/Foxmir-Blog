<script>
(() => {
  const articlePathPattern = /\/publish\/[^/]+\/[^/]+\.html$/i;
  const desktopMedia = window.matchMedia('(min-width: 1200px)');
  const maxDepth = 3;

  const slugify = (value) => value
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\u4e00-\u9fff]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'section';

  const ensureHeadingIds = (headings) => {
    const used = new Set();
    headings.forEach((heading, index) => {
      let id = heading.id || slugify(heading.textContent || heading.innerText || `section-${index + 1}`);
      while (used.has(id)) {
        id = `${id}-${index + 1}`;
      }
      used.add(id);
      heading.id = id;
    });
  };

  const buildTree = (headings, rootLevel) => {
    const items = [];
    const stack = [];

    const createItem = (heading) => ({
      id: heading.id,
      level: Number(heading.tagName.slice(1)),
      normalizedLevel: Number(heading.tagName.slice(1)) - rootLevel,
      label: (heading.textContent || '').trim(),
      heading,
      children: [],
      parent: null
    });

    headings.forEach((heading) => {
      const item = createItem(heading);
      if (item.normalizedLevel > maxDepth) {
        return;
      }

      while (stack.length > 0 && stack[stack.length - 1].level >= item.level) {
        stack.pop();
      }

      if (stack.length === 0) {
        items.push(item);
      } else {
        item.parent = stack[stack.length - 1];
        item.parent.children.push(item);
      }

      stack.push(item);
    });

    return items;
  };

  const getRootAncestor = (item) => {
    let current = item || null;
    while (current?.parent) {
      current = current.parent;
    }
    return current;
  };

  const getDepthOneAncestor = (item) => {
    let current = item || null;
    while (current && current.normalizedLevel > 1) {
      current = current.parent;
    }
    return current;
  };

  const getAncestors = (item) => {
    const ancestors = new Set();
    let current = item?.parent || null;
    while (current) {
      ancestors.add(current.id);
      current = current.parent;
    }
    return ancestors;
  };

  const flatten = (items) => {
    const all = [];
    const walk = (node) => {
      all.push(node);
      node.children.forEach(walk);
    };
    items.forEach(walk);
    return all;
  };

  const getActiveItem = (allItems) => {
    const offset = 160;
    const currentY = window.scrollY + offset;
    let active = allItems[0] || null;
    allItems.forEach((item) => {
      if (item.heading.offsetTop <= currentY) {
        active = item;
      }
    });
    return active;
  };

  const createLink = (item) => {
    const li = document.createElement('li');
    li.className = `context-outline__item context-outline__item--level-${item.normalizedLevel}`;
    li.dataset.outlineId = item.id;
    const link = document.createElement('a');
    link.href = `#${item.id}`;
    link.textContent = item.label;
    li.appendChild(link);
    return li;
  };

  const renderBranch = (items, activeItem, ancestors, activeDepthOneAncestor) => {
    const list = document.createElement('ul');
    items.forEach((item) => {
      const entry = createLink(item);
      if (activeItem?.id === item.id) entry.classList.add('is-active');
      if (ancestors.has(item.id)) entry.classList.add('is-ancestor');

      if (item.children.length > 0) {
        const shouldRenderChildren = item.normalizedLevel === 0
          ? item.id === getRootAncestor(activeItem)?.id
          : item.normalizedLevel === 1
            ? item.id === activeDepthOneAncestor?.id
            : false;

        if (shouldRenderChildren) {
          entry.appendChild(renderBranch(item.children, activeItem, ancestors, activeDepthOneAncestor));
        }
      }

      list.appendChild(entry);
    });
    return list;
  };

  const renderNav = (nav, items, activeItem) => {
    const ancestors = getAncestors(activeItem);
    const activeDepthOneAncestor = getDepthOneAncestor(activeItem);
    nav.replaceChildren(renderBranch(items, activeItem, ancestors, activeDepthOneAncestor));
  };

  const initOutline = () => {
    if (!articlePathPattern.test(window.location.pathname)) return;
    const contentRoot = document.querySelector('#quarto-document-content');
    if (!contentRoot) return;

    const headings = Array.from(contentRoot.querySelectorAll('h1, h2, h3, h4')).filter((heading) => {
      const text = (heading.textContent || '').trim();
      return text.length > 0;
    });
    if (headings.length < 2) return;

    ensureHeadingIds(headings);
    const rootLevel = headings.reduce((minLevel, heading) => {
      const level = Number(heading.tagName.slice(1));
      return Math.min(minLevel, level);
    }, 6);
    const items = buildTree(headings, rootLevel);
    const allItems = flatten(items);
    if (allItems.length === 0) return;

    const aside = document.createElement('aside');
    aside.className = 'context-outline';
    aside.setAttribute('aria-label', 'On this page');

    const inner = document.createElement('div');
    inner.className = 'context-outline__inner';
    const label = document.createElement('div');
    label.className = 'context-outline__label';
    label.textContent = 'On this page';
    const nav = document.createElement('nav');
    nav.className = 'context-outline__nav';

    inner.append(label, nav);
    aside.appendChild(inner);
    document.body.appendChild(aside);
    document.body.classList.add('has-context-outline');

    let activeId = '';
    let ticking = false;
    const update = () => {
      ticking = false;
      const nextActive = getActiveItem(allItems);
      if (!nextActive || nextActive.id === activeId) return;
      activeId = nextActive.id;
      renderNav(nav, items, nextActive);
    };

    const requestUpdate = () => {
      if (!desktopMedia.matches) return;
      if (!ticking) {
        ticking = true;
        window.requestAnimationFrame(update);
      }
    };

    desktopMedia.addEventListener('change', () => {
      if (desktopMedia.matches) {
        requestUpdate();
      }
    });

    window.addEventListener('scroll', requestUpdate, { passive: true });
    window.addEventListener('resize', requestUpdate);
    renderNav(nav, items, allItems[0]);
    requestUpdate();
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initOutline, { once: true });
  } else {
    initOutline();
  }
})();
</script>
